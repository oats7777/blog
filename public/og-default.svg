<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grain/grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <rect x="0" y="0" width="1" height="1" fill="#1a1a1a"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#c8ff00;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#c8ff00;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#c8ff00"/>

  <!-- MK logo mark -->
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" letter-spacing="0.1em" fill="#c8ff00">MK</text>

  <!-- Blog title -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" letter-spacing="-0.03em" fill="#fafafa">Minkyu's Tech Blog</text>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#888888">Frontend Developer &amp; Creative Engineer</text>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="monospace" font-size="20" font-weight="400" fill="#555555">fe-minkyu.dev</text>

  <!-- Bottom decorative dots -->
  <circle cx="570" cy="470" r="4" fill="#c8ff00"/>
  <circle cx="590" cy="470" r="4" fill="#c8ff00" fill-opacity="0.5"/>
  <circle cx="610" cy="470" r="4" fill="#c8ff00" fill-opacity="0.25"/>
  <circle cx="630" cy="470" r="4" fill="#c8ff00" fill-opacity="0.1"/>
</svg>
